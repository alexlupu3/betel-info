services:
  app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ".:/var/www/html"
    depends_on:
      - db
    environment:
      APP_ENV: local
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: betel_admin
      DB_USERNAME: betel
      DB_PASSWORD: secret

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: betel_admin
      POSTGRES_USER: betel
      POSTGRES_PASSWORD: secret
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  pgdata:
